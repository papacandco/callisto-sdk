name: Go SDK

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"

defaults:
  run:
    working-directory: go

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.21", "1.22"]
    name: go ${{ matrix.go }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.mod

      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
