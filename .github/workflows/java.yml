name: Java SDK

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - ".github/workflows/java.yml"
  pull_request:
    paths:
      - "java/**"
      - ".github/workflows/java.yml"

defaults:
  run:
    working-directory: java

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["11", "17"]
    name: java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - run: mvn -B test
